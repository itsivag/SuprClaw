#cloud-config
# Podman multi-tenant host setup
# Installs Podman + Traefik, creates picoclaw user with provisioning SSH key.
# Writes /var/run/suprclaw-host-ready when complete.

users:
  - name: picoclaw
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - {{SSH_PUBLIC_KEY}}

package_update: true
package_upgrade: false

packages:
  - curl
  - ca-certificates
  - gnupg
  - lsb-release
  - jq
  - ufw

write_files:
  - path: /etc/ssh/ssh_host_ed25519_key
    owner: root:root
    permissions: '0600'
    content: |
{{HOST_SSH_PRIVATE_KEY}}
  - path: /etc/ssh/ssh_host_ed25519_key.pub
    owner: root:root
    permissions: '0644'
    content: |
{{HOST_SSH_PUBLIC_KEY}}
  - path: /opt/traefik/traefik.yml
    owner: root:root
    permissions: '0644'
    content: |
      entryPoints:
        web:
          address: ":80"
          http:
            redirections:
              entryPoint:
                to: websecure
                scheme: https
                permanent: true
        websecure:
          address: ":443"
        traefik:
          address: ":8080"
      api:
        insecure: true
        dashboard: true
      providers:
        file:
          directory: /opt/traefik/dynamic
          watch: true
      log:
        level: INFO
        format: json
      accessLog:
        format: json
      certificatesResolvers:
        letsencrypt:
          acme:
            email: admin@suprclaw.com
            storage: /opt/traefik/certs/acme.json
            tlsChallenge: {}

runcmd:
  - systemctl restart ssh || systemctl restart sshd || true
  - apt-get update -y
  - DEBIAN_FRONTEND=noninteractive apt-get install -y podman containernetworking-plugins uidmap slirp4netns fuse-overlayfs
  - systemctl enable podman-restart.service
  - systemctl start podman-restart.service
  - loginctl enable-linger picoclaw
  - mkdir -p /opt/traefik/dynamic /opt/traefik/certs
  - touch /opt/traefik/certs/acme.json
  - chmod 600 /opt/traefik/certs/acme.json
  - chown -R picoclaw:picoclaw /opt/traefik
  - mkdir -p /var/log/suprclaw
  - chown picoclaw:picoclaw /var/log/suprclaw
  - ufw --force reset
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw route allow proto tcp from any to 10.88.0.0/16 port 80
  - ufw route allow proto tcp from any to 10.88.0.0/16 port 443
  - ufw allow from 127.0.0.1 to any port 8080
  - ufw --force enable
  - podman rm -f traefik || true
  - podman run -d --name traefik --restart unless-stopped --network host -v /opt/traefik/traefik.yml:/etc/traefik/traefik.yml:ro -v /opt/traefik/dynamic:/opt/traefik/dynamic:ro -v /opt/traefik/certs:/opt/traefik/certs -e TZ=UTC traefik:v3.0
  - touch /var/run/suprclaw-host-ready
