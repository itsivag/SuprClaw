# Dynamic Traefik Configuration Template
# 
# This is a template for per-user routing configuration.
# The actual files will be generated by TraefikManager with:
# - {{SUBDOMAIN}} replaced with user subdomain (e.g., user1.suprclaw.com)
# - {{PORT}} replaced with allocated host port (e.g., 18001)

http:
  routers:
    # Router for the user's PicoClaw gateway
    {{SUBDOMAIN}}-router:
      rule: "Host(`{{SUBDOMAIN}}`)"
      service: {{SUBDOMAIN}}-service
      entryPoints:
        - websecure
      tls: {}
      # Optional: add middleware for rate limiting, auth, etc.
      # middlewares:
      #   - rate-limit
  
  services:
    # Service pointing to user's container
    {{SUBDOMAIN}}-service:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:{{PORT}}"
        healthCheck:
          path: /health
          interval: 10s
          timeout: 5s
  
  # Optional middleware definitions
  # middlewares:
  #   rate-limit:
  #     rateLimit:
  #       average: 100
  #       burst: 50
