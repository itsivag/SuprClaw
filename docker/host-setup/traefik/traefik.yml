# Traefik Static Configuration
# 
# This is the main Traefik configuration file.
# It defines entrypoints, API access, and providers.
# Dynamic configurations (routers for each user) are loaded from the dynamic/ directory.

global:
  checkNewVersion: false
  sendAnonymousUsage: false

# Entrypoints (ports Traefik listens on)
entryPoints:
  # HTTP - redirects to HTTPS
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  
  # HTTPS - main entrypoint for user containers
  websecure:
    address: ":443"
    http:
      tls: {}
  
  # Traefik dashboard/API (restrict access!)
  traefik:
    address: ":8080"

# API and Dashboard Configuration
api:
  insecure: true  # Set to false and use basic auth in production
  dashboard: true
  debug: false

# Provider Configuration
providers:
  # File provider - loads dynamic configs from directory
  file:
    directory: /opt/traefik/dynamic
    watch: true  # Auto-reload when files change
  
  # Docker provider - discovers containers with labels
  docker:
    exposedByDefault: false  # Only expose containers with explicit labels
    network: bridge

# Logging
log:
  level: INFO
  format: json

# Access Logs
accessLog:
  format: json
  bufferingSize: 100

# TLS Configuration
# Using static wildcard cert from /opt/traefik/certs/ (copied from /etc/letsencrypt/live/suprclaw.com/)
tls:
  stores:
    default:
      defaultCertificate:
        certFile: /opt/traefik/certs/wildcard.crt
        keyFile: /opt/traefik/certs/wildcard.key
  
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305

# Ping endpoint for health checks
ping:
  entryPoint: "traefik"
