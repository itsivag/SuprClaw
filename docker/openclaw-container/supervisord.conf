; Supervisor configuration for OpenClaw container
; Manages: openclaw-gateway, mcp-auth-proxy, mcporter

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

; Increase startup timeout for slow-starting services
startsecs=5
startretries=3

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

; ═══════════════════════════════════════════════════════════════════════════════
; OpenClaw Gateway
; ═══════════════════════════════════════════════════════════════════════════════
[program:openclaw-gateway]
command=openclaw gateway start
user=openclaw
environment=HOME="/home/openclaw",USER="openclaw",GATEWAY_TOKEN="%(ENV_GATEWAY_TOKEN)s"
directory=/home/openclaw
autostart=true
autorestart=true
startsecs=10
startretries=5
stopwaitsecs=30
stopsignal=TERM

; Logging
stdout_logfile=/var/log/supervisor/openclaw-gateway.log
stderr_logfile=/var/log/supervisor/openclaw-gateway.err
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile_backups=3

; ═══════════════════════════════════════════════════════════════════════════════
; MCP Auth Proxy
; Routes MCP tool calls with authentication
; ═══════════════════════════════════════════════════════════════════════════════
[program:mcp-auth-proxy]
command=mcp-auth-proxy
user=openclaw
environment=HOME="/home/openclaw",USER="openclaw"
directory=/home/openclaw
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=10
stopsignal=TERM

; Logging
stdout_logfile=/var/log/supervisor/mcp-auth-proxy.log
stderr_logfile=/var/log/supervisor/mcp-auth-proxy.err
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile_backups=3

; ═══════════════════════════════════════════════════════════════════════════════
; MCPorter
; Manages MCP tool processes
; ═══════════════════════════════════════════════════════════════════════════════
[program:mcporter]
command=mcporter
user=openclaw
environment=HOME="/home/openclaw",USER="openclaw"
directory=/home/openclaw
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=10
stopsignal=TERM

; Logging
stdout_logfile=/var/log/supervisor/mcporter.log
stderr_logfile=/var/log/supervisor/mcporter.err
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile_backups=3

; ═══════════════════════════════════════════════════════════════════════════════
; Nginx (optional - for health checks and static files)
; ═══════════════════════════════════════════════════════════════════════════════
[program:nginx]
command=nginx -g 'daemon off;'
user=root
autostart=false  ; Disabled by default, enable if needed
autorestart=true
startsecs=2

; Logging
stdout_logfile=/var/log/supervisor/nginx.log
stderr_logfile=/var/log/supervisor/nginx.err

; ═══════════════════════════════════════════════════════════════════════════════
; Group: All OpenClaw services
; ═══════════════════════════════════════════════════════════════════════════════
[group:openclaw]
programs=openclaw-gateway,mcp-auth-proxy,mcporter
priority=999

; ═══════════════════════════════════════════════════════════════════════════════
; Event listener: Restart services on unexpected exits
; ═══════════════════════════════════════════════════════════════════════════════
[eventlistener:crashmail]
command=/bin/bash -c 'echo "Process crashed: %(process_name)s" >> /var/log/supervisor/crashes.log'
events=PROCESS_STATE_EXITED,PROCESS_STATE_FATAL
buffer_size=10
