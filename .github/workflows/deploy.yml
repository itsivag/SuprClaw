name: Deploy Backend to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/suprclaw-backend
      IMAGE_TAG: ${{ github.sha }}
      LITELLM_IMAGE: ${{ secrets.LITELLM_IMAGE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load deploy variables from ENV_FILE
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -z "$ENV_FILE" ]; then
            echo "Missing required secret: ENV_FILE"
            exit 1
          fi

          printf '%b' "$ENV_FILE" > .deploy.env
          python3 - <<'PY'
          from pathlib import Path

          deploy_env = Path(".deploy.env")
          text = deploy_env.read_text()
          if "\\n" in text:
              text = text.replace("\\r\\n", "\n").replace("\\n", "\n")
              deploy_env.write_text(text)
          PY

          required_env_keys=(
            HETZNER_SERVER_IP
            HETZNER_DEPLOY_USER
            GHCR_PULL_USERNAME
            GHCR_PULL_TOKEN
            SSH_PRIVATE_KEY
          )

          for key in "${required_env_keys[@]}"; do
            value="$(grep -E "^${key}=" .deploy.env | tail -n1 | cut -d= -f2-)"
            if [ -z "$value" ]; then
              echo "Missing required entry in ENV_FILE: $key"
              exit 1
            fi
            printf '%s=%s\n' "$key" "$value" >> "$GITHUB_ENV"
          done

          api_host="$(grep -E '^SUPRCLAW_API_HOST=' .deploy.env | tail -n1 | cut -d= -f2-)"
          if [ -n "$api_host" ]; then
            printf 'SUPRCLAW_API_HOST=%s\n' "$api_host" >> "$GITHUB_ENV"
          else
            printf 'SUPRCLAW_API_HOST=%s\n' "api.suprclaw.com" >> "$GITHUB_ENV"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build fat jar
        run: ./gradlew clean shadowJar verifyFatJar -x test --no-daemon

      - name: Log in to GHCR
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        uses: redhat-actions/podman-login@v1

      - name: Build and push backend image
        id: build-backend-image
        uses: redhat-actions/buildah-build@v2
        with:
          context: .
          containerfiles: |
            ./containers/backend/Containerfile
          image: suprclaw-backend
          tags: |
            latest
            ${{ env.IMAGE_TAG }}

      - name: Push backend image to GHCR
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-backend-image.outputs.image }}
          tags: ${{ steps.build-backend-image.outputs.tags }}
          registry: ghcr.io/${{ github.repository_owner }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare deployment bundle
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          mkdir -p deploy-bundle
          cp deploy/podman/up.sh deploy-bundle/
          cp deploy/podman/down.sh deploy-bundle/
          cp deploy/podman/Caddyfile deploy-bundle/
          cp deploy/podman/litellm-config-template.yaml deploy-bundle/
          cp deploy/podman/suprclaw-stack.service deploy-bundle/

          printf '%b' "$ENV_FILE" > deploy-bundle/backend.env
          : > deploy-bundle/litellm.env
          : > deploy-bundle/litellm-config.yaml

          python3 - <<'PY'
          from pathlib import Path

          deploy_env = Path(".deploy.env")

          def normalize(path: Path) -> None:
              if not path.exists():
                  return
              text = path.read_text()
              if "\\n" in text:
                  text = text.replace("\\r\\n", "\n").replace("\\n", "\n")
                  path.write_text(text)

          def parse_env(path: Path) -> dict[str, str]:
              values: dict[str, str] = {}
              if not path.exists():
                  return values
              for raw_line in path.read_text().splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith("#") or "=" not in line:
                      continue
                  key, value = line.split("=", 1)
                  values[key] = value
              return values

          normalize(deploy_env)
          normalize(Path("deploy-bundle/backend.env"))
          normalize(Path("deploy-bundle/litellm.env"))

          deploy_values = parse_env(deploy_env)
          api_host = deploy_values.get("SUPRCLAW_API_HOST", "api.suprclaw.com")
          lite_enabled = deploy_values.get("LITELLM_ENABLED", "").lower() in {"1", "true", "yes", "on"}
          if not lite_enabled:
              lite_enabled = any(
                  deploy_values.get(key, "")
                  for key in ("LITELLM_UPSTREAM_MODEL", "AWS_BEARER_TOKEN_BEDROCK", "AWS_ACCESS_KEY_ID")
              )

          proxy_model_name = deploy_values.get("LITELLM_PROXY_MODEL_NAME", "").strip() or "suprclaw-default"
          upstream_model = deploy_values.get("LITELLM_UPSTREAM_MODEL", "").strip()
          master_key = (
              deploy_values.get("LITELLM_MASTER_KEY", "").strip()
              or deploy_values.get("LITELLM_API_KEY", "").strip()
          )
          public_base = deploy_values.get("LITELLM_PUBLIC_BASE", "").strip() or f"https://{api_host}/litellm/v1"
          model_id = deploy_values.get("LITELLM_MODEL_ID", "").strip() or f"litellm/{proxy_model_name}"

          if lite_enabled and not upstream_model:
              raise SystemExit("LiteLLM is enabled, but LITELLM_UPSTREAM_MODEL is missing from ENV_FILE.")
          if lite_enabled and not master_key:
              raise SystemExit("LiteLLM is enabled, but LITELLM_MASTER_KEY or LITELLM_API_KEY is missing from ENV_FILE.")

          backend_env = Path("deploy-bundle/backend.env")
          excluded_keys = {
              # Deploy transport and registry credentials should never reach the app container.
              "GHCR_PULL_TOKEN",
              "GHCR_PULL_USERNAME",
              "HETZNER_DEPLOY_USER",
              "HETZNER_SERVER_IP",
              "SSH_PRIVATE_KEY",
              # Retired provider/runtime keys should not reach the current backend container.
              "DIGITALOCEAN_API_KEY",
              "DIGITALOCEAN_SSH_KEYS",
              "GEMINI_API_KEY",
              "SUPRCLAW_DEVICE_PRIVATE_KEY_B64",
              "SUPRCLAW_DEVICE_PUBLIC_KEY_B64",
              "SUPRCLAW_STATIC_DEVICE_ID",
              "SUPABASE_MCP_URL",
              "DOCKER_OPENCLAW_IMAGE",
              "LITELLM_ENABLED",
              "LITELLM_MASTER_KEY",
              "LITELLM_PROXY_MODEL_NAME",
              "LITELLM_PUBLIC_BASE",
              "LITELLM_UPSTREAM_MODEL",
              # Firebase credentials are mounted as a file instead of injected inline.
              "FIREBASE_CREDENTIALS_JSON",
              "FIREBASE_CREDENTIALS_JSON_B64",
          }
          lines = backend_env.read_text().splitlines()
          updates = {
              "SSL_ENABLED": "true",
              "FIREBASE_CREDENTIALS_PATH": "/etc/suprclaw/firebase-credentials.json",
          }
          if lite_enabled:
              updates["LITELLM_API_BASE"] = public_base
              updates["LITELLM_API_KEY"] = master_key
              updates["LITELLM_MODEL_ID"] = model_id
          seen = set()
          rewritten = []
          for line in lines:
              if "=" not in line or line.lstrip().startswith("#"):
                  rewritten.append(line)
                  continue
              key, _ = line.split("=", 1)
              if key in excluded_keys:
                  continue
              if key in updates:
                  rewritten.append(f"{key}={updates[key]}")
                  seen.add(key)
              else:
                  rewritten.append(line)
          for key, value in updates.items():
              if key not in seen:
                  rewritten.append(f"{key}={value}")
          backend_env.write_text("\n".join(rewritten) + "\n")

          litellm_env = Path("deploy-bundle/litellm.env")
          litellm_config = Path("deploy-bundle/litellm-config.yaml")
          template = Path("deploy-bundle/litellm-config-template.yaml")
          if lite_enabled:
              region_name = (
                  deploy_values.get("AWS_REGION_NAME", "").strip()
                  or deploy_values.get("AWS_REGION", "").strip()
                  or "us-east-1"
              )
              litellm_env_lines = [
                  f"LITELLM_MASTER_KEY={master_key}",
                  f"AWS_REGION_NAME={region_name}",
              ]
              for key in ("AWS_ACCESS_KEY_ID", "AWS_SECRET_ACCESS_KEY", "AWS_BEARER_TOKEN_BEDROCK"):
                  value = deploy_values.get(key, "").strip()
                  if value:
                      litellm_env_lines.append(f"{key}={value}")
              litellm_env.write_text("\n".join(litellm_env_lines) + "\n")

              litellm_config.write_text(
                  template.read_text()
                  .replace("__LITELLM_PROXY_MODEL_NAME__", proxy_model_name)
                  .replace("__LITELLM_UPSTREAM_MODEL__", upstream_model)
                  .replace("__LITELLM_MASTER_KEY__", master_key)
              )
          else:
              litellm_env.write_text("")
              litellm_config.write_text("")
          PY

          firebase_credentials_b64="$(grep -E '^FIREBASE_CREDENTIALS_JSON_B64=' .deploy.env | tail -n1 | cut -d= -f2-)"
          firebase_credentials_json="$(grep -E '^FIREBASE_CREDENTIALS_JSON=' .deploy.env | tail -n1 | cut -d= -f2-)"
          source_credentials_path="$(grep -E '^FIREBASE_CREDENTIALS_PATH=' .deploy.env | tail -n1 | cut -d= -f2-)"
          if [ -n "$firebase_credentials_b64" ]; then
            printf '%s' "$firebase_credentials_b64" | base64 -d > deploy-bundle/firebase-credentials.json
          elif [ -n "$firebase_credentials_json" ]; then
            printf '%s' "$firebase_credentials_json" > deploy-bundle/firebase-credentials.json
          elif [ -n "$source_credentials_path" ] && [ -f "$source_credentials_path" ]; then
            cp "$source_credentials_path" deploy-bundle/firebase-credentials.json
          else
            echo "Missing Firebase credentials in ENV_FILE. Set FIREBASE_CREDENTIALS_JSON_B64, FIREBASE_CREDENTIALS_JSON, or a valid FIREBASE_CREDENTIALS_PATH."
            exit 1
          fi

          cat > deploy-bundle/stack.env <<EOF
          BACKEND_IMAGE=${IMAGE_NAME}:${IMAGE_TAG}
          LITELLM_IMAGE=$(grep -E '^LITELLM_IMAGE=' .deploy.env | tail -n1 | cut -d= -f2- || true)
          SUPRCLAW_API_HOST=${SUPRCLAW_API_HOST:-api.suprclaw.com}
          EOF

          python3 - <<'PY'
          from pathlib import Path

          stack_env = Path("deploy-bundle/stack.env")
          lines = []
          for raw in stack_env.read_text().splitlines():
              if raw.startswith("LITELLM_IMAGE=") and raw == "LITELLM_IMAGE=":
                  raw = "LITELLM_IMAGE=ghcr.io/berriai/litellm:main-stable"
              lines.append(raw)
          stack_env.write_text("\n".join(lines) + "\n")
          PY

          tar -czf suprclaw-podman-deploy.tar.gz -C deploy-bundle .

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HETZNER_SERVER_IP" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$HETZNER_DEPLOY_USER@$HETZNER_SERVER_IP" "echo Hetzner SSH connection successful"

      - name: Upload deployment bundle
        run: scp -i ~/.ssh/deploy_key suprclaw-podman-deploy.tar.gz "$HETZNER_DEPLOY_USER@$HETZNER_SERVER_IP":~/

      - name: Deploy Podman stack on Hetzner
        run: |
          ssh -i ~/.ssh/deploy_key "$HETZNER_DEPLOY_USER@$HETZNER_SERVER_IP" \
            "GHCR_PULL_USERNAME='$GHCR_PULL_USERNAME' GHCR_PULL_TOKEN='$GHCR_PULL_TOKEN' bash -s" <<'ENDSSH'
              set -euo pipefail

              mkdir -p ~/suprclaw-deploy
              tar -xzf ~/suprclaw-podman-deploy.tar.gz -C ~/suprclaw-deploy

              sudo install -d -m 0755 /opt/suprclaw/podman /etc/suprclaw /var/lib/suprclaw/caddy/data /var/lib/suprclaw/caddy/config
              sudo install -m 0755 ~/suprclaw-deploy/up.sh /opt/suprclaw/podman/up.sh
              sudo install -m 0755 ~/suprclaw-deploy/down.sh /opt/suprclaw/podman/down.sh
              sudo install -m 0644 ~/suprclaw-deploy/Caddyfile /etc/suprclaw/Caddyfile
              sudo install -m 0644 ~/suprclaw-deploy/suprclaw-stack.service /etc/systemd/system/suprclaw-stack.service
              sudo install -m 0600 ~/suprclaw-deploy/backend.env /etc/suprclaw/backend.env
              sudo install -m 0644 ~/suprclaw-deploy/firebase-credentials.json /etc/suprclaw/firebase-credentials.json
              sudo install -m 0600 ~/suprclaw-deploy/litellm.env /etc/suprclaw/litellm.env
              sudo install -m 0644 ~/suprclaw-deploy/litellm-config.yaml /etc/suprclaw/litellm-config.yaml
              sudo install -m 0644 ~/suprclaw-deploy/stack.env /etc/default/suprclaw-stack

              sudo ufw allow 80/tcp
              sudo ufw allow 443/tcp
              sudo ufw route allow proto tcp from any to 10.88.0.0/16 port 80 || true
              sudo ufw route allow proto tcp from any to 10.88.0.0/16 port 443 || true

              echo "$GHCR_PULL_TOKEN" | sudo podman login ghcr.io --username "$GHCR_PULL_USERNAME" --password-stdin

              sudo systemctl daemon-reload
              sudo systemctl enable suprclaw-stack.service
              sudo systemctl restart suprclaw-stack.service

              sudo systemctl is-active --quiet suprclaw-stack.service
              sudo podman ps
          ENDSSH

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key "$HETZNER_DEPLOY_USER@$HETZNER_SERVER_IP" \
            "curl -fsS -H 'Host: ${SUPRCLAW_API_HOST:-api.suprclaw.com}' http://127.0.0.1/health"

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -f suprclaw-podman-deploy.tar.gz
