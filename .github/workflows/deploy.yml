name: Deploy Backend to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/suprclaw-backend
      IMAGE_TAG: ${{ github.sha }}
      DEPLOY_HOST: ${{ secrets.HETZNER_SERVER_IP }}
      DEPLOY_USER: ${{ secrets.HETZNER_DEPLOY_USER }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      SUPRCLAW_API_HOST: ${{ secrets.SUPRCLAW_API_HOST }}
      LITELLM_IMAGE: ${{ secrets.LITELLM_IMAGE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          required_vars=(
            DEPLOY_HOST
            DEPLOY_USER
            GHCR_PULL_USERNAME
            GHCR_PULL_TOKEN
            SSH_PRIVATE_KEY
            ENV_FILE
          )
          for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: $var"
              exit 1
            fi
          done

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build fat jar
        run: ./gradlew clean shadowJar verifyFatJar -x test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Prepare deployment bundle
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          LITELLM_ENV_FILE: ${{ secrets.LITELLM_ENV_FILE }}
          LITELLM_CONFIG_YAML: ${{ secrets.LITELLM_CONFIG_YAML }}
        run: |
          mkdir -p deploy-bundle
          cp deploy/podman/up.sh deploy-bundle/
          cp deploy/podman/down.sh deploy-bundle/
          cp deploy/podman/Caddyfile deploy-bundle/
          cp deploy/podman/suprclaw-stack.service deploy-bundle/

          printf '%s' "$ENV_FILE" > deploy-bundle/backend.env
          printf '%s' "$LITELLM_ENV_FILE" > deploy-bundle/litellm.env
          printf '%s' "$LITELLM_CONFIG_YAML" > deploy-bundle/litellm-config.yaml

          cat > deploy-bundle/stack.env <<EOF
BACKEND_IMAGE=${IMAGE_NAME}:${IMAGE_TAG}
LITELLM_IMAGE=${LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-stable}
SUPRCLAW_API_HOST=${SUPRCLAW_API_HOST:-api.suprclaw.com}
EOF

          tar -czf suprclaw-podman-deploy.tar.gz -C deploy-bundle .

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" "echo Hetzner SSH connection successful"

      - name: Upload deployment bundle
        run: scp -i ~/.ssh/deploy_key suprclaw-podman-deploy.tar.gz "$DEPLOY_USER@$DEPLOY_HOST":~/

      - name: Deploy Podman stack on Hetzner
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "GHCR_PULL_USERNAME='$GHCR_PULL_USERNAME' GHCR_PULL_TOKEN='$GHCR_PULL_TOKEN' bash -s" <<'ENDSSH'
              set -euo pipefail

              mkdir -p ~/suprclaw-deploy
              tar -xzf ~/suprclaw-podman-deploy.tar.gz -C ~/suprclaw-deploy

              sudo install -d -m 0755 /opt/suprclaw/podman /etc/suprclaw /var/lib/suprclaw/caddy/data /var/lib/suprclaw/caddy/config
              sudo install -m 0755 ~/suprclaw-deploy/up.sh /opt/suprclaw/podman/up.sh
              sudo install -m 0755 ~/suprclaw-deploy/down.sh /opt/suprclaw/podman/down.sh
              sudo install -m 0644 ~/suprclaw-deploy/Caddyfile /etc/suprclaw/Caddyfile
              sudo install -m 0644 ~/suprclaw-deploy/suprclaw-stack.service /etc/systemd/system/suprclaw-stack.service
              sudo install -m 0600 ~/suprclaw-deploy/backend.env /etc/suprclaw/backend.env
              sudo install -m 0600 ~/suprclaw-deploy/litellm.env /etc/suprclaw/litellm.env
              sudo install -m 0644 ~/suprclaw-deploy/litellm-config.yaml /etc/suprclaw/litellm-config.yaml
              sudo install -m 0644 ~/suprclaw-deploy/stack.env /etc/default/suprclaw-stack

              echo "$GHCR_PULL_TOKEN" | sudo podman login ghcr.io --username "$GHCR_PULL_USERNAME" --password-stdin

              sudo systemctl daemon-reload
              sudo systemctl enable suprclaw-stack.service
              sudo systemctl restart suprclaw-stack.service

              sudo systemctl is-active --quiet suprclaw-stack.service
              sudo podman ps
          ENDSSH

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "curl -fsS -H 'Host: ${SUPRCLAW_API_HOST:-api.suprclaw.com}' http://127.0.0.1/health"

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -f suprclaw-podman-deploy.tar.gz
